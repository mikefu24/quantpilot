name: Build macOS DMG

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2
      - name: Generate app icons
        run: tauri icon app/icons/icon-1024.png
      - name: Build DMG (universal 可改 aarch64/x64)
        run: tauri build --bundles dmg
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuantPilot-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
      - name: Attach to Release (tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/dmg/*.dmg
