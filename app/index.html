<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>QuantPilot · 智能交易终端</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script>
// 首屏防闪烁:渲染前应用已保存主题
try {
  var __t = (JSON.parse(localStorage.getItem('qp.settings.v1')) || {}).theme;
  if (__t) document.documentElement.dataset.theme = __t;
} catch (e) {}
</script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <div class="boot-splash">
    <div class="boot-logo">Q</div>
    <div class="boot-name">QuantPilot</div>
    <div class="boot-sub">AI 驱动 · 多市场智能交易终端</div>
  </div>
</div>
<script type="module" src="src/main.js"></script>
<script>
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
